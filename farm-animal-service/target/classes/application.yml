spring:
  application:
    name: farm-animal-service
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:farm_animals}
    username: ${DB_USER:farm_user}
    password: ${DB_PASSWORD:}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:farm_animals}
    username: ${DB_USER:farm_user}
    password: ${DB_PASSWORD}
    pool:
      initial-size: 5
      max-size: 10
      validation-query: SELECT 1
  data:
    redis:
      reactive:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}
        password: ${REDIS_PASSWORD:}
        lettuce:
          pool:
            max-active: 8
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: ${KAFKA_GROUP_ID:animal-service}
      auto-offset-reset: earliest
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    mapper:
      accept-case-insensitive-enums: true

#  security:
#    oauth2:
#      resourceserver:
#        jwt:
#          issuer-uri: ${KEYCLOAK_URL}/realms/farm-management

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:

    health:

      probes:

        enabled: true

  metrics:
    export:
      prometheus:
        enabled: true

resilience4j:
  circuitbreaker:
    instances:
      animal-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

logging:
  level:
    com.cgfms: DEBUG
    org.springframework.web: DEBUG
    org.springframework.r2dbc: DEBUG
    liquibase: DEBUG
    com.zaxxer.hikari: DEBUG
  pattern:
    console: "%d{HH:mm:ss} [%thread] [traceId=%X{traceId}] %-5level %logger{36} - %msg%n"