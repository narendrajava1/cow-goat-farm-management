apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: farm-animal

  labels:
    app: redis

spec:

  replicas: 1

  selector:
    matchLabels:
      app: redis

  template:

    metadata:

      labels:
        app: redis

    spec:

      containers:

        - name: redis

          image: redis:7-alpine

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 6379

          resources:

            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

          livenessProbe:

            tcpSocket:
              port: 6379

            initialDelaySeconds: 15

            periodSeconds: 20

          readinessProbe:

            tcpSocket:
              port: 6379

            initialDelaySeconds: 5

            periodSeconds: 10