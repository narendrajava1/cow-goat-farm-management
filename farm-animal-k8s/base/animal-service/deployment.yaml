apiVersion: apps/v1
kind: Deployment

metadata:
  name: animal-service
  namespace: farm-animal

  labels:
    app: animal-service

spec:

  replicas: 2

  selector:
    matchLabels:
      app: animal-service

  template:

    metadata:

      labels:
        app: animal-service

    spec:

      serviceAccountName: animal-service-sa

      containers:

        - name: animal-service

          image: farm-animal-service:1.0.0

          imagePullPolicy: IfNotPresent

          ports:

            - containerPort: 8080

          envFrom:

            - configMapRef:
                name: animal-config

            - secretRef:
                name: animal-secret

          resources:

            requests:
              cpu: "250m"
              memory: "512Mi"

            limits:
              cpu: "500m"
              memory: "1Gi"

          livenessProbe:

            httpGet:

              path: /actuator/health/liveness

              port: 8080

            initialDelaySeconds: 60

            periodSeconds: 20

          readinessProbe:

            httpGet:

              path: /actuator/health/readiness

              port: 8080

            initialDelaySeconds: 30

            periodSeconds: 10

          startupProbe:

            httpGet:

              path: /actuator/health

              port: 8080

            failureThreshold: 30

            periodSeconds: 10