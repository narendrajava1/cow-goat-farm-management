apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgresql
  namespace: farm-animal

spec:

  replicas: 1

  selector:
    matchLabels:
      app: postgresql

  template:

    metadata:

      labels:
        app: postgresql

    spec:

      containers:

        - name: postgres

          image: postgres:15

          ports:
            - containerPort: 5432

          env:

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: animal-config
                  key: DB_NAME

            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: animal-config
                  key: DB_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: animal-secret
                  key: DB_PASSWORD

          volumeMounts:

            - mountPath: /var/lib/postgresql/data
              name: postgres-storage

      volumes:

        - name: postgres-storage

          persistentVolumeClaim:

            claimName: postgres-pvc